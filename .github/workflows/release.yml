name: Release

# Automates the two-stage release flow from docs/release.md on a `v*` tag push:
#   1. build + verify (pytest gate so a broken tag never ships)
#   2. publish to PyPI via Trusted Publishing (OIDC — no stored token)
#   3. create the GitHub Release from docs/releases/<tag>.md with dist assets
#
# To complete Stage 2, configure a PyPI pending publisher (one-time, on PyPI):
#   project: agentcli-py · owner: saintiron82 · repo: agentcli
#   workflow: release.yml · environment: pypi
# Prefer a token instead? Drop the `permissions.id-token` + `environment` from
# pypi-publish and pass `password: ${{ secrets.PYPI_API_TOKEN }}` to the publish
# step.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev environment
        run: python -m pip install -e ".[dev]"

      - name: Run test suite (release gate)
        run: python -m pytest

      - name: Build distributions
        run: |
          rm -rf dist/
          python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  pypi-publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentcli-py
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          notes="docs/releases/${TAG}.md"
          if [ -f "$notes" ]; then
            gh release create "$TAG" dist/* --title "$TAG" --notes-file "$notes"
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi
